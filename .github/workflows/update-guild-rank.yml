# Relève toutes les 3 h la position de La Clauderie dans le classement des
# guildes du serveur (l'API publique du jeu) et met à jour guild.json si elle
# a changé — le badge de l'accueil suit tout seul. Le champ manuel de
# l'espace officiers reste utilisable en secours ; ce workflow le réécrira
# au prochain passage si le classement réel diffère.
name: Classement de la guilde

on:
  schedule:
    - cron: "7 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write   # pour relancer le déploiement Pages après le commit

# Même groupe de concurrence que le recalcul BiS (cron 15 min) : les deux
# écrivent sur main, et un push simultané faisait échouer ce job jusqu'au
# passage suivant, 3 h plus tard.
concurrency:
  group: bis-update
  cancel-in-progress: false

jobs:
  rank:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Relever le classement
        id: releve
        run: |
          set -euo pipefail
          # On relève à la fois NOTRE rang (pages 0..4) et le TOP 10 (page 0) :
          # la pastille de l'accueil ouvre une petite fenêtre avec ce top,
          # rendue depuis guild.json (même origine, pas de CORS à espérer).
          top="[]"
          me=""
          for page in 0 1 2 3 4; do
            resp=$(curl -s -m 20 "https://worldofclaudecraft.com/api/leaderboard?board=guilds&page=$page&pageSize=50" || true)
            if [ "$page" = "0" ]; then
              top=$(echo "$resp" | jq -c '[.leaders[]? | {rank,name,memberCount,totalLifetimeXp,topLevel}][0:10]' 2>/dev/null || echo '[]')
            fi
            m=$(echo "$resp" | jq -c '.leaders[]? | select((.name | ascii_downcase) == "la clauderie") | {rank,name,memberCount,totalLifetimeXp,topLevel}' 2>/dev/null | head -1)
            if [ -n "$m" ]; then
              me="$m"
              break
            fi
            n=$(echo "$resp" | jq -r '.leaders | length' 2>/dev/null || echo 0)
            if [ "$n" = "0" ]; then
              break
            fi
          done
          if [ -z "$me" ]; then
            echo "Guilde introuvable dans le classement — on garde la valeur affichée."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          rank=$(echo "$me" | jq -r .rank)
          cur=$(jq -r '.guilde.classementServeur // empty' guild.json)
          echo "Classement relevé : $rank (affiché : ${cur:-aucun})"
          now=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          new=$(jq -cn --argjson r "$rank" --argjson t "$top" --argjson m "$me" --arg now "$now" \
            '{classementServeur:$r, classement:{releveLe:$now, metric:"guildLifetimeXp", top:$t, laClauderie:$m}}')
          # Signature SANS les totaux d'XP (ils bougent en continu) : on ne
          # committe que si le classement lui-même change — rangs, noms ou
          # effectifs — pour ne pas déployer le site toutes les 3 h pour rien.
          sig='{classementServeur, sig: ((.classement // {}) | {top: ((.top // [])|map({rank,name,memberCount})), lc: ((.laClauderie // null)|if .==null then null else {rank,name,memberCount} end)})}'
          new_sig=$(echo "{\"guilde\":$new}" | jq -c ".guilde | $sig")
          cur_sig=$(jq -c ".guilde | $sig" guild.json)
          if [ "$new_sig" = "$cur_sig" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          jq --argjson g "$new" '.guilde = $g' guild.json > guild.tmp && mv guild.tmp guild.json
          git config user.name "clauderie-bot"
          git config user.email "actions@users.noreply.github.com"
          git add guild.json
          if [ "$cur" = "$rank" ]; then
            git commit -m "guilde : top 10 du classement mis à jour (rang inchangé : $rank)"
          else
            git commit -m "guilde : classement serveur ${cur:-?} → $rank"
          fi
          # Secours si un autre workflow a poussé sur main entre-temps.
          pushed=false
          for i in 1 2 3 4; do
            if git push; then pushed=true; break; fi
            echo "push échoué, rebase et nouvelle tentative ($i)…"
            git pull --rebase origin main
          done
          if [ "$pushed" != "true" ]; then
            echo "::error::Impossible de pousser après 4 tentatives."
            exit 1
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # Un push fait avec le GITHUB_TOKEN ne déclenche pas les workflows
      # « on: push » — on relance donc les publications explicitement.
      - name: Publier le site
        if: steps.releve.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy-pages.yml --ref main
          gh workflow run deploy-ovh.yml --ref main
