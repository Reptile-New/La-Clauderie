# Publie le site de La Clauderie sur GitHub Pages à chaque changement sur main.
#
# Prérequis (une seule fois) : Settings → Pages → "Build and deployment" →
# Source : "GitHub Actions". Le lien public apparaît ensuite dans Settings → Pages.

name: Deploy La Clauderie sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assembler le site
        run: |
          mkdir -p _site
          cp *.html *.json _site/   # toutes les pages et données de la racine — une nouvelle page ne peut plus être oubliée du déploiement
          cp -r assets _site/assets
          cp -r notes _site/notes

      - name: Configurer Pages
        uses: actions/configure-pages@v5

      - name: Uploader l'artefact du site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
