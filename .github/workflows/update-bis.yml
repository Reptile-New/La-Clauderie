# Recalcule les pages « mécaniques » du site à partir des données réelles du
# jeu, sans IA ni intervention humaine : le BiS (page Builds) et les données de
# la page Récolte & Métiers. Tourne toutes les 15 min : récupère la knowledge base
# (repo public wocc-knowledge-base, déjà régénérée tout seule à chaque nouvelle
# version du jeu), régénère bis.html + metiers.html et ne commite QUE si quelque
# chose a changé. 100 % déterministe — la partie « à calculer, pas à rédiger ».
#
# La rédaction des pages « Nouveautés » (notes/vX.Y.Z.html) reste éditoriale :
# le workflow « Alerte nouvelle version du jeu » ouvre une issue de rappel quand
# une version n'y est pas encore.
name: Recalcul BiS + Récolte/Métiers

on:
  schedule:
    - cron: '11,26,41,56 * * * *'   # toutes les 15 min, décalé des autres crons ; ne commite que si les données ont changé
  workflow_dispatch: {}

# Concurrence partagée avec les autres écritures sur main pour éviter les
# courses au push (rebase auto plus bas en secours).
concurrency:
  group: bis-update
  cancel-in-progress: false

permissions:
  contents: write
  actions: write   # pour relancer les déploiements après le commit

jobs:
  bis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du site
        uses: actions/checkout@v4

      # La knowledge base vit dans son propre repo public ; on la lit telle
      # quelle (mêmes données que celles servies sous /codex/ et /data/).
      - name: Checkout de la knowledge base
        uses: actions/checkout@v4
        with:
          repository: Reptile-New/wocc-knowledge-base
          path: wocc-knowledge-base

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Régénérer bis.html et metiers.html
        id: gen
        run: |
          set -euo pipefail
          # BiS (Builds)
          python3 scripts/compute_bis.py wocc-knowledge-base/data > bis_new.json
          python3 scripts/inject_bis.py wocc-knowledge-base/data bis.html bis_new.json
          # Récolte & Métiers
          python3 scripts/build_craft.py wocc-knowledge-base/data > craft.json
          python3 scripts/inject_craft.py metiers.html craft.json
          rm -f bis_new.json craft.json
          if git diff --quiet -- bis.html metiers.html; then
            echo "BiS et Récolte/Métiers déjà à jour."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commiter les pages régénérées
        if: steps.gen.outputs.changed == 'true'
        run: |
          set -euo pipefail
          tag=$(python3 -c "import json;print(json.load(open('wocc-knowledge-base/data/_meta.json'))['tag'])")
          git config user.name "clauderie-bot"
          git config user.email "actions@users.noreply.github.com"
          git add bis.html metiers.html
          git commit -m "Builds + Récolte/Métiers : recalcul automatique sur les données $tag"
          # Secours si un autre workflow a poussé sur main entre-temps.
          for i in 1 2 3 4; do
            git push && break || { echo "push échoué, rebase et nouvelle tentative ($i)…"; git pull --rebase origin main; }
          done

      # Un push au GITHUB_TOKEN ne déclenche pas les workflows « on: push » —
      # on relance donc les publications explicitement (OVH + GitHub Pages).
      - name: Publier le site
        if: steps.gen.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy-pages.yml --ref main
          gh workflow run deploy-ovh.yml --ref main
