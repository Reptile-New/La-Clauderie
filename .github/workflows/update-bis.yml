# Recalcule le BiS (page Builds) à partir des données réelles du jeu, sans IA
# ni intervention humaine. Tourne toutes les 6 h : récupère la knowledge base
# (repo public wocc-knowledge-base, déjà régénérée tout seule à chaque nouvelle
# version du jeu), lance compute_bis.py, réinjecte le résultat dans bis.html et
# ne commite QUE si quelque chose a changé. Le calcul est 100 % déterministe —
# c'est la partie « mécanique » de la mise à jour du site, désormais automatique.
#
# La rédaction des pages « Nouveautés » (notes/vX.Y.Z.html) reste éditoriale :
# le workflow « Alerte nouvelle version du jeu » ouvre une issue de rappel quand
# une version n'y est pas encore.
name: Recalcul du BiS (Builds)

on:
  schedule:
    - cron: '41 */6 * * *'   # décalé des autres crons du repo
  workflow_dispatch: {}

# Concurrence partagée avec les autres écritures sur main pour éviter les
# courses au push (rebase auto plus bas en secours).
concurrency:
  group: bis-update
  cancel-in-progress: false

permissions:
  contents: write
  actions: write   # pour relancer les déploiements après le commit

jobs:
  bis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du site
        uses: actions/checkout@v4

      # La knowledge base vit dans son propre repo public ; on la lit telle
      # quelle (mêmes données que celles servies sous /codex/ et /data/).
      - name: Checkout de la knowledge base
        uses: actions/checkout@v4
        with:
          repository: Reptile-New/wocc-knowledge-base
          path: wocc-knowledge-base

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Recalculer le BiS et l'injecter dans bis.html
        id: bis
        run: |
          set -euo pipefail
          python3 scripts/compute_bis.py wocc-knowledge-base/data > bis_new.json
          python3 scripts/inject_bis.py wocc-knowledge-base/data bis.html bis_new.json
          rm -f bis_new.json
          if git diff --quiet -- bis.html; then
            echo "Le BiS est déjà à jour."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commiter le nouveau BiS
        if: steps.bis.outputs.changed == 'true'
        run: |
          set -euo pipefail
          tag=$(python3 -c "import json;print(json.load(open('wocc-knowledge-base/data/_meta.json'))['tag'])")
          git config user.name "clauderie-bot"
          git config user.email "actions@users.noreply.github.com"
          git add bis.html
          git commit -m "Builds : recalcul automatique du BiS sur les données $tag"
          # Secours si un autre workflow a poussé sur main entre-temps.
          for i in 1 2 3 4; do
            git push && break || { echo "push échoué, rebase et nouvelle tentative ($i)…"; git pull --rebase origin main; }
          done

      # Un push au GITHUB_TOKEN ne déclenche pas les workflows « on: push » —
      # on relance donc les publications explicitement (OVH + GitHub Pages).
      - name: Publier le site
        if: steps.bis.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy-pages.yml --ref main
          gh workflow run deploy-ovh.yml --ref main
