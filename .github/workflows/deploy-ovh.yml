# Publie le site sur l'hébergement OVH (https://laclauderie.fr) à chaque
# changement sur main, par FTP.
#
# Note : l'hébergement offert avec le domaine ne supporte que le FTP simple —
# le serveur répond « 500 This security scheme is not implemented » en FTPS
# (testé), et le SFTP est réservé aux offres payantes Pro/Performance.
#
# Prérequis (une seule fois) : créer 3 secrets dans
# Settings → Secrets and variables → Actions → "New repository secret" :
#
#   OVH_FTP_SERVER    → l'« Adresse du serveur FTP » (ex: ftp.cluster0XX.hosting.ovh.net),
#                       visible dans l'espace client OVH : Web Cloud → Hébergements
#                       → laclauderie.fr → onglet FTP-SSH
#   OVH_FTP_USERNAME  → l'« identifiant principal » du même onglet (ex: laclaudp)
#   OVH_FTP_PASSWORD  → le mot de passe FTP (bouton « Modifier le mot de passe »
#                       dans le même onglet si vous ne l'avez pas encore défini)
#
# Le site est envoyé dans le dossier www/ de l'hébergement (la racine du site).
# Seuls les fichiers modifiés sont retransférés à chaque passage.
#
# Le Codex WoCC (repo public Reptile-New/wocc-knowledge-base) est copié au
# passage : sa page sous www/codex/ et ses données JSON sous www/data/, pour
# que https://laclauderie.fr/codex/ marche sans quitter le domaine. Comme le
# Codex se régénère tout seul à chaque release du jeu, ce workflow tourne
# aussi périodiquement (cron ci-dessous) pour garder la copie à jour.

name: Deploy La Clauderie sur OVH

on:
  push:
    branches: [main]
  schedule:
    # Rafraîchit la copie du Codex (données régénérées côté wocc-knowledge-base)
    - cron: '23 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ovh
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vérifier que les secrets FTP sont configurés
        env:
          FTP_SERVER: ${{ secrets.OVH_FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.OVH_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.OVH_FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_SERVER" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "::error::Secrets FTP manquants. Créer OVH_FTP_SERVER, OVH_FTP_USERNAME et OVH_FTP_PASSWORD dans Settings → Secrets and variables → Actions (voir le commentaire en tête de ce fichier)."
            exit 1
          fi

      # Le Codex vit dans son propre repo (public) ; on l'embarque tel quel.
      - name: Checkout du Codex (wocc-knowledge-base)
        uses: actions/checkout@v4
        with:
          repository: Reptile-New/wocc-knowledge-base
          path: wocc-knowledge-base

      # Mêmes fichiers que le déploiement GitHub Pages, plus le .htaccess
      # (redirections HTTPS/www, utile seulement chez OVH).
      - name: Assembler le site
        run: |
          mkdir -p _site
          cp *.html *.json _site/   # toutes les pages et données de la racine — une nouvelle page ne peut plus être oubliée du déploiement
          cp -r assets _site/assets
          cp -r notes _site/notes
          cp .htaccess _site/.htaccess
          # Codex : la page sous /codex/, les JSON sous /data/ (la page les
          # charge en relatif via « ../data/ », comme sur GitHub Pages).
          cp -r wocc-knowledge-base/site _site/codex
          cp -r wocc-knowledge-base/data _site/data

      - name: Déployer sur OVH (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.OVH_FTP_SERVER }}
          username: ${{ secrets.OVH_FTP_USERNAME }}
          password: ${{ secrets.OVH_FTP_PASSWORD }}
          # FTP simple : tenté en FTPS le 19/07/2026, mais ce serveur OVH
          # répond « 500 This security scheme is not implemented » à AUTH TLS.
          # Si OVH active le FTPS explicite un jour, repasser à ftps.
          protocol: ftp
          local-dir: _site/
          server-dir: www/
